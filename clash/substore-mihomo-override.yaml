mode: rule
log-level: info
mixed-port: 7890
port: 7891
socks-port: 7892
redir-port: 7893
tproxy-port: 7894
ipv6: false
allow-lan: true
authentication:
  - "ikunji:ikunji"
unified-delay: true
tcp-concurrent: true

geodata-mode: true
geodata-loader: standard
geo-auto-update: false
geo-update-interval: 48
geox-url:
  geoip: "https://mirror.ghproxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://mirror.ghproxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://mirror.ghproxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"

external-controller: 0.0.0.0:8090
secret: "ikunji"
external-ui-url: "https://gh-proxy.com/https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"
find-process-mode: strict
keep-alive-idle: 600
keep-alive-interval: 30

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - "+.apple.com"

tun:
  enable: false
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  strict-route: true
  exclude-interface:
    - "Tailscale"

# DNS模块
dns:
  enable: true
  prefer-h3: false
  listen: 127.0.0.1:1053
  ipv6: false
  # enhanced-mode: fake-ip # redir-host/fake-ip
  fake-ip-range: 28.0.0.1/8
  # 模式切换 whitelist/blacklist
  # 黑名单模式表示如果匹配成功则不返回 Fake-IP, 白名单模式时只有匹配成功才返回 Fake-IP
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    # - "*" # 当作 redir-host 模式使用
    - "+.lan"
    - "+.local"
    - "*.msftconnecttest.com"
    - "dns.alidns.com"
    - "dot.pub"
    - "dns.google"
    - "cloudflare-dns.com"
    - "one.one.one.one"
    - "dns.quad9.net"
  respect-rules: true
  default-nameserver: # 默认 DNS, 用于解析 DNS 服务器 的域名，必须为 IP, 可为加密 DNS
    - tls://223.5.5.5
    - tls://223.6.6.6
    - system
  proxy-server-nameserver: # 专用于节点域名解析的 DNS 服务器
    - 'https://223.5.5.5/dns-query#h3=true'
    - 'https://223.6.6.6/dns-query#h3=true'
  # 配置查询域名使用的 DNS 服务器
  nameserver-policy:
    "+.lan,+.in-addr.arpa": system
    "rule-set:private_domain,steam@cn,category-games@cn,cn_domain":
      - system # 直连域名走系统DNS
      - tls://223.5.5.5
      - 114.114.114.114
    "rule-set:My_Reject,AWAvenue-AD": rcode://success # 广告域名直接返回成功（等于拦截）
  nameserver: # 兜底DNS，用于解析基于IP的规则的域名，即既不在代理域名规则内也不在直连域名规则内的域名
    - '8.8.8.8#🔍 DNS_OUT' # 指定 DNS 过代理查询，🔍 DNS_OUT 为策略组名或节点名
    - '1.1.1.1#🔍 DNS_OUT'
    - 'tls://8.8.8.8#🔍 DNS_OUT'
    - 'tls://1.1.1.1#🔍 DNS_OUT'
