# Sub-Store Mihomo 覆写 v3：按来源分组版
# 前提：在每个单条订阅先用 substore-source-prefix.js 给节点打标：
#   peiqian -> [peiqian]
#   ikuuu   -> [ikuuu]
#   自建     -> [自建]
# 注意：这里不要写 proxies:，否则会覆盖 Sub-Store 生成的节点。

group-anchor:
  pr: &pr {type: select, proxies: [🚀 节点选择, 🏗 自建, 🎯 全球直连, 🇭🇰 香港, 🇭🇰 香港-自建, 🇨🇳 台湾, 🇯🇵 日本, 🇯🇵 日本-自建, 🇸🇬 狮城-自建, 🇸🇬 狮城, 🇺🇲 美国, 🇺🇲 美国-自建, 🇦🇺 澳大利亚,🇦🇺 澳大利亚-自建, 🇹🇷 土耳其, 🇰🇷 韩国, 其它地区, 全部节点, ♻️ 自动选择]}
  url-test: &url-test {type: 'url-test', url: "https://cp.cloudflare.com/generate_204", interval: 300}

rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  classical: &classical {type: http, interval: 86400, behavior: classical, format: text}

proxy-groups:
  - {name: '🚀 节点选择', type: 'select', proxies: ['♻️ 自动选择', '🏗 自建', '🇭🇰 香港-自建', '🇯🇵 日本-自建', '🇸🇬 狮城-自建', '🇺🇲 美国-自建', '🚁 机场自动', '📲 白嫖自动', '🚁 机场', '📲 白嫖', '🇭🇰 香港', '🇯🇵 日本', '🇸🇬 狮城', '🇺🇲 美国', '🇨🇳 台湾', '🇰🇷 韩国', '其它地区', '🎯 全球直连']}
  - {name: '🏗 自建', type: 'select', include-all-proxies: true, filter: '^\[自建\]', exclude-filter: '^\[自建\]DIRECT-'}
  - {name: 🀄 中转, type: select, proxies: [🚁 机场, 🚁 机场自动,  📲 白嫖, 📲 白嫖自动, 🇭🇰 香港, 🇸🇬 狮城, 🇺🇲 美国, 🇯🇵 日本, 🇰🇷 韩国, 其它地区]}
  - {name: '💬 AI', <<: *pr}
  - {name: 'OpenAI', <<: *pr, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/ChatGPT.png'}
  - {name: 'Google', <<: *pr, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Google_Search.png'}
  - {name: 'Cloudflare@cn', <<: *pr, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Cloudflare.png'}
  - {name: '微软服务', <<: *pr, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Microsoft.png'}
  - {name: 'Telegram', <<: *pr, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Telegram.png'}
  - {name: 'Twitter', <<: *pr, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Twitter.png'}
  - {name: 'Meta', <<: *pr, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Facebook.png'}
  - {name: 'Spotify', <<: *pr, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Spotify.png'}
  - {name: 'Steam@cn', <<: *pr, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Game.png'}
  - {name: 'epicgame', <<: *pr, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Epic_Games.png'}
  - {name: '🇯🇵 日本-自建', type: 'select', include-all-proxies: true, filter: '(?i)^\[自建\].*(日|jp|japan|🇯🇵)'}
  - {name: '🇺🇲 美国-自建', type: 'select', include-all-proxies: true, filter: '(?i)^\[自建\].*(美|us|usa|unitedstates|united states|america|🇺🇸|🇺🇲)'}
  - {name: '🇭🇰 香港-自建', type: 'select', include-all-proxies: true, filter: '(?i)^\[自建\].*(港|hk|hongkong|hong kong|🇭🇰)'}
  - {name: '🇸🇬 狮城-自建', type: 'select', include-all-proxies: true, filter: '(?i)^\[自建\].*(新|sg|singapore|狮城|獅城|🇸🇬)'}
  - {name: '🇦🇺 澳大利亚-自建', type: 'select', include-all-proxies: true, filter: '(?i)^\[自建\].*(澳|au|australia|🇦🇺)'}
  - {name: '🚁 机场', type: 'select', include-all-proxies: true, filter: '^\[peiqian\]'}
  - {name: '🚁 机场自动', <<: *url-test, include-all-proxies: true, filter: '^\[peiqian\]'}
  - {name: '📲 白嫖', type: 'select', include-all-proxies: true, filter: '^\[ikuuu\]'}
  - {name: '📲 白嫖自动', <<: *url-test, include-all-proxies: true, filter: '^\[ikuuu\]'}
  - {name: '♻️ 自动选择', <<: *url-test, proxies: ['🚁 机场自动', '📲 白嫖自动', '🏗 自建']}
  - {name: '🎯 全球直连', type: 'select', proxies: ['DIRECT'], include-all-proxies: true, filter: '^\[自建\]DIRECT-'}
  - {name: '🛑 全球拦截', type: 'select', proxies: ['REJECT', '🎯 全球直连']}
  - {name: '🐟 漏网之鱼', type: 'select', proxies: ['🚀 节点选择', '🎯 全球直连', '♻️ 自动选择']}
  - {name: '🔍 DNS_OUT', <<: *pr}
  - {name: '🇯🇵 日本', <<: *url-test, tolerance: 10, include-all-proxies: true, filter: '(?i)日|jp|japan|🇯🇵', exclude-filter: '^\[自建\]'}
  - {name: '🇸🇬 狮城', <<: *url-test, tolerance: 10, include-all-proxies: true, filter: '(?i)(新|sg|singapore|狮城|獅城|🇸🇬)', exclude-filter: '^\[自建\]'}
  - {name: '🇭🇰 香港', <<: *url-test, tolerance: 10, include-all-proxies: true, filter: '(?i)港|hk|hongkong|hong kong|🇭🇰', exclude-filter: '^\[自建\]'}
  - {name: '🇨🇳 台湾', <<: *url-test, tolerance: 10, include-all-proxies: true, filter: '(?i)台|tw|taiwan|🇹🇼', exclude-filter: '^\[自建\]'}
  - {name: '🇺🇲 美国', <<: *url-test, tolerance: 10, include-all-proxies: true, filter: '(?i)美|us|usa|unitedstates|united states|america|🇺🇸|🇺🇲', exclude-filter: '^\[自建\]'}
  - {name: '🇰🇷 韩国', <<: *url-test, tolerance: 10, include-all-proxies: true, filter: '(?i)(KR|Korea|KOR|首尔|首爾|韩|韓|🇰🇷)', exclude-filter: '^\[自建\]'}
  - {name: '🇦🇺 澳大利亚', <<: *url-test, tolerance: 10, include-all-proxies: true, filter: "(?i)(澳|au|australia|🇦🇺)", exclude-filter: '^\[自建\]'}
  - {name: '🇹🇷 土耳其', <<: *url-test, tolerance: 10, include-all-proxies: true, filter: "(?i)(土|tr|turkey|türkiye|turkiye|🇹🇷)", exclude-filter: '^\[自建\]'}
  - {name: '其它地区', <<: *url-test, include-all-proxies: true, filter: '.*', exclude-filter: '(?i)^\[自建\]|🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇹🇼|🇨🇳|🇰🇷|🇦🇺|🇹🇷|港|hk|hongkong|台|tw|taiwan|日|jp|japan|新|sg|singapore|狮城|獅城|美|us|usa|unitedstates|america|韩|韓|首尔|首爾|KR|Korea|KOR|澳|au|australia|土|tr|turkey|türkiye|turkiye'}
  - {name: '全部节点', type: 'select', include-all-proxies: true, exclude-type: 'Direct'}

rules:
  - AND,((RULE-SET,cn_domain),(DST-PORT,3478)),🎯 全球直连
  - AND,((RULE-SET,cn_ip),(DST-PORT,3478)),🎯 全球直连
  - DST-PORT,3478,🚀 节点选择
  - DOMAIN-SUFFIX,fedorainfracloud.org,🎯 全球直连
  - DOMAIN-SUFFIX,fedoraproject.org,🎯 全球直连
  - RULE-SET,My_Reject,🛑 全球拦截
  - RULE-SET,My_Proxy,🚀 节点选择
  - RULE-SET,My_Direct,🎯 全球直连
  - RULE-SET,AWAvenue-AD,🛑 全球拦截
  - RULE-SET,private_domain,🎯 全球直连
  - RULE-SET,steam@cn,Steam@cn
  - RULE-SET,epicgame,epicgame
  - RULE-SET,cloudflare@cn,Cloudflare@cn
  - RULE-SET,category-games@cn,Steam@cn
  - RULE-SET,cn_domain,🎯 全球直连
  - RULE-SET,openai,OpenAI
  - RULE-SET,google_domain,Google
  - RULE-SET,twitter_domain,Twitter
  - RULE-SET,meta_domain,Meta
  - RULE-SET,category-ai-chat-!cn,💬 AI
  - RULE-SET,telegram_domain,Telegram
  - RULE-SET,spotify_domain,Spotify
  - RULE-SET,microsoft_domain,微软服务
  - RULE-SET,github_domain,其它地区
  - RULE-SET,geolocation-!cn,🚀 节点选择
  - RULE-SET,google_ip,🚀 节点选择,no-resolve
  - RULE-SET,netflix_ip,🚀 节点选择,no-resolve
  - RULE-SET,telegram_ip,🚀 节点选择,no-resolve
