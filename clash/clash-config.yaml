######### 锚点 start #######
anchors:
  # === proxy providers 相关锚点 ===
  #这里是订阅更新和延迟测试相关的
  p: &p {type: http, interval: 3600, health-check: {enable: true, url: https://cp.cloudflare.com/generate_204, interval: 300}}

  # 订阅节点覆盖项，代理节点统一从无线网卡发起连接
  # po: &po {interface-name: wlp11s0}

  # === proxy-groups 相关锚点 ===
  pr: &pr {type: select, proxies: [🚀 节点选择,🏗 自建,🇭🇰 香港,🇭🇰 香港-自建,🇨🇳 台湾,🇯🇵 日本,🇯🇵 日本-自建,🇸🇬 狮城-自建, 🇸🇬 狮城,🇺🇲 美国,🇺🇲 美国-自建,🇰🇷 韩国,其它地区,全部节点,♻️ 自动选择,🎯 全球直连]}

  #=== rule provider 相关锚点 ===
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  classical: &classical {type: http, interval: 86400, behavior: classical, format: text}

######### 锚点 end #######

#----------------------------- 订阅地址配置--------------------#
# url 里填写自己的订阅,名称不能重复
# 'xjb' 这种机场的名字可以随便填写，也可以另起一行增加多个机场。只需注意⚠️：修改这里后需要对应修改 `proxy-groups` 策略组配置部分
proxy-providers:
  peiqian:
    <<: *p
    url: ""
    override:
      # <<: *po
      additional-prefix: "[别名]"

# -----------------------------------节点配置---------------------------------------#
# 自建的节点可以h手动配置到这里，参考wiki出站部分配置 https://wiki.metacubex.one/config/proxies/
proxies:
  - name: DIRECT-ENO1
    type: direct
    udp: true
    interface-name: eno1

# --------------------------策略组配置-------------------------#
proxy-groups:
  - {name: 🚀 节点选择, type: select, proxies: [♻️ 自动选择, 🏗 自建, 🚁 机场自动, 📲 白嫖自动, 🚁 机场, 📲 白嫖, 🎯 全球直连]}
  - {name: 🏗 自建, type: select, tolerance: 10, include-all-proxies: true, exclude-type: "Direct"}
  - {name: 🀄 中转, type: select, proxies: [🚁 机场, 🚁 机场自动,  📲 白嫖, 🇭🇰 香港, 🇸🇬 狮城, 🇺🇲 美国, 🇯🇵 日本, 🇰🇷 韩国, 其它地区]}
  - {name: 🚁 机场, type: select, use: [peiqian]}
  - {name: 🔍 DNS_OUT, <<: *pr}
  # - {name: Tailscale, type: select, proxies: [tailscale, 🎯 全球直连]}
  - {name: 💬 AI, <<: *pr}
  - {name: OpenAI, <<: *pr, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/ChatGPT.png"}
  - {name: Google, <<: *pr, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Google_Search.png"}
  - {name: Cloudflare@cn, <<: *pr, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Cloudflare.png"}
  - {name: 微软服务, <<: *pr, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Microsoft.png"}
  - {name: Telegram, <<: *pr, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Telegram.png"}
  - {name: Twitter, <<: *pr, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Twitter.png"}
  - {name: Meta, <<: *pr, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Facebook.png"}
  - {name: Spotify, <<: *pr, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Spotify.png"}
  - {name: Steam@cn, <<: *pr, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Game.png"}
  - {name: epicgame, <<: *pr, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Epic_Games.png"}
  - {name: 🇯🇵 日本-自建, type: select, include-all-proxies: true, filter: "(?i)日|jp|japan"}
  - {name: 🇺🇲 美国-自建, type: select, include-all-proxies: true, filter: "(?i)美|us|unitedstates|united states"}
  - {name: 🇭🇰 香港-自建, type: select, include-all-proxies: true, filter: "(?i)港|hk|hongkong|hong kong"}
  - {name: 🇸🇬 狮城-自建, type: select, include-all-proxies: true, filter: "(?i)(新|sg|singapore|🇸🇬)"}
  - {name: 🎯 全球直连, type: select, proxies: [DIRECT, DIRECT-ENO1]}
  - {name: 📲 白嫖, type: select, use: [ikuuu]}
  - {name: ♻️ 自动选择, type: url-test, tolerance: 10, proxies: [📲 白嫖自动, 🏗 自建, 🚁 机场自动]}
  - {name: 🚁 机场自动, type: url-test, tolerance: 10, use: [peiqian]}
  - {name: 📲 白嫖自动, type: url-test, tolerance: 50, use: [ikuuu]}
  - {name: 🛑 全球拦截, type: select, proxies: [REJECT, 🎯 全球直连]}
  - {name: 🐟 漏网之鱼, type: select, proxies: [🚀 节点选择, 🎯 全球直连, ♻️ 自动选择]}

  # 分隔,下面是地区分组
  - {name: 🇯🇵 日本, type: url-test, tolerance: 10, include-all-providers: true, filter: "(?i)日|jp|japan|🇯🇵"}
  - {name: 🇸🇬 狮城, type: url-test, tolerance: 10, include-all-providers: true, filter: "(?i)(新|sg|singapore|🇸🇬)"}
  - {name: 🇭🇰 香港, type: url-test, tolerance: 10, include-all-providers: true, filter: "(?i)港|hk|hongkong|hong kong|🇭🇰"}
  - {name: 🇨🇳 台湾, type: url-test, tolerance: 10, include-all-providers: true, filter: "(?i)台|tw|taiwan"}
  - {name: 🇺🇲 美国, type: url-test, tolerance: 10, include-all-providers: true, filter: "(?i)美|us|unitedstates|united states|🇺🇲"}
  - {name: 🇰🇷 韩国, type: url-test, tolerance: 10, include-all-providers: true, filter: "(?i)(KR|Korea|KOR|首尔|韩|韓|🇰🇷)"}
  - {name: 其它地区, type: url-test, tolerance: 10, include-all-providers: true, filter: "(?i)^(?!.*(?:🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇨🇳|🇰🇷|港|hk|hongkong|台|tw|taiwan|日|jp|japan|新|sg|singapore|美|us|unitedstates|韩|首尔|KR|Korea|KOR)).*"}
  - {name: 全部节点, type: select , include-all: true, exclude-type: "Direct"}


# ----------------------------规则配置-----------------------#
rules:
  # 自己规则

  - AND,((RULE-SET,cn_domain),(DST-PORT,3478)),🎯 全球直连 # 中国域名 STUN 直连
  - AND,((RULE-SET,cn_ip),(DST-PORT,3478)),🎯 全球直连 # 中国 IP STUN 直连
  - DST-PORT,3478,🚀 节点选择
  - DOMAIN-SUFFIX,fedorainfracloud.org,🎯 全球直连
  - DOMAIN-SUFFIX,fedoraproject.org,🎯 全球直连
  # - DOMAIN-KEYWORD,copr,🎯 全球直连
  - IP-CIDR,20.205.243.166/32,🎯 全球直连,no-resolve  # 阻止 DNS 干扰
  # - IP-CIDR,192.168.11.0/24,Tailscale,no-resolve
  # - IP-CIDR,192.168.1.0/24,Tailscale,no-resolve
  # - IP-CIDR,100.64.0.0/10,Tailscale,no-resolve
  - RULE-SET,My_Reject,🛑 全球拦截
  - RULE-SET,My_Proxy,🚀 节点选择
  - RULE-SET,My_Direct,🎯 全球直连

  # RULE-SET规则
  - RULE-SET,AWAvenue-AD,🛑 全球拦截
  - RULE-SET,private_domain,🎯 全球直连 # 局域网域名直连
  - RULE-SET,steam@cn,Steam@cn
  - RULE-SET,epicgame,epicgame
  - RULE-SET,cloudflare@cn,Cloudflare@cn
  - RULE-SET,category-games@cn,Steam@cn
  - RULE-SET,cn_domain,🎯 全球直连

  - RULE-SET,openai,OpenAI
  - RULE-SET,google_domain,Google
  - RULE-SET,twitter_domain,Twitter
  - RULE-SET,meta_domain,Meta
  - RULE-SET,category-ai-chat-!cn,💬 AI
  - RULE-SET,telegram_domain,Telegram
  - RULE-SET,spotify_domain,Spotify
  - RULE-SET,microsoft_domain,微软服务
  - RULE-SET,github_domain,其它地区
  - RULE-SET,telegram_domain,🚀 节点选择
  - RULE-SET,geolocation-!cn,🚀 节点选择

  - RULE-SET,google_ip,🚀 节点选择,no-resolve
  - RULE-SET,netflix_ip,🚀 节点选择,no-resolve
  - RULE-SET,telegram_ip,🚀 节点选择,no-resolve
  - RULE-SET,private_ip,🎯 全球直连,no-resolve # 局域网ip直连
  - RULE-SET,cn_ip,🎯 全球直连

  - MATCH,🐟 漏网之鱼

